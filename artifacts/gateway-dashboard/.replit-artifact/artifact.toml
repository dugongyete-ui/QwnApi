kind = "web"
previewPath = "/"
title = "Chat Gateway Dashboard"
version = "1.0.0"
id = "artifacts/gateway-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22790

[services.development]
run = "pnpm --filter @workspace/gateway-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gateway-dashboard", "run", "build" ]
publicDir = "artifacts/gateway-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22790"
BASE_PATH = "/"
